services:
  - type: web
    name: booksummaries-api
    runtime: node
    plan: free
    rootDir: .
    autoDeploy: true
    buildCommand: npm install && npm --workspace @distill/contracts run build && npm --workspace @distill/api run build
    startCommand: npm --workspace @distill/api run db:push && npm --workspace @distill/api run db:seed && npm --workspace @distill/api run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: JWT_SECRET
        generateValue: true
      - key: CONTENT_POLICY_MODE
        value: unrestricted
      - key: DEFAULT_TIMEZONE
        value: America/Los_Angeles
      - key: RUN_INGEST_WORKER
        value: false
